        { text: "ஒருமை – பன்மை பிழையற்ற வாக்கியம்", options: ["[A] பாணையை உடைத்தது கண்ணன் அல்லன்", "[B] பாணையை உடைத்தது கண்ணன் அல்லன்", "[C] பாணைய உடைத்தது கண்ணன் அல்லர்", "[D] பாணைய உடைத்தது கண்ணன் அன்று"], correct: "A" },
        { text: "சந்திப்பிழையற்ற வாக்கியத்தை கண்டறிக.", options: ["[A] ஒன்றை சொல்லுவதற்கென்று இசைக்கப்படும் இசைக்கவல்ல தாளக் கருவி பறை", "[B] ஒன்றைச் சொல்லுவதற்கென்று இசைக்கப்படும் இசைக்கவல்ல தாள கருவி பறை", "[C] ஒன்றைச் சொல்லுவதற்கென்று இசைக்கப்படும் இசைக்கவல்ல தாளக் கருவி பறை", "[D] ஒன்றை சொல்லுவதற்கென்று இசைக்கப்படும் இசைக்கவல்ல தாள கருவி பறை"], correct: "C" },
        { text: "ஒருமை பன்மை பிழையறிதல் – சரியான தொடர்", options: ["[A] சித்தர்கள் செயற்கையை விரும்பியவர்கள் அல்லன்", "[B] சித்தர்கள் செயற்கையை விரும்பியவர்கள் அல்லள்", "[C] சித்தர்கள் செயற்கையை விரும்பியவர்கள் அன்று", "[D] சித்தர்கள் செயற்கையை விரும்பியவர்கள் அல்லர்"], correct: "D" },

        { text: "கண்ணுறங்கு என்பதைப் பிரித்தெழுதுக", options: ["[A] கண் + உறங்கு", "[B] கண்ணு + உறங்கு", "[C] கண்ண + உறங்கு", "[D] கண் + றங்கு"], correct: "A" },
        { text: "பொருள் யாது? அடை – ஆப்பு – அட்டம்", options: ["[A] உணவு பண்டம் – கருவி – எட்டு", "[B] துணி – எட்டுப்பிடி – நடனம்", "[C] எட்டு – கருவி – உணவுப் பண்டம்", "[D] நடனம் – எட்டுப்பிடி – துணி"], correct: "D" },
        { text: "ஒருமை பன்மை பிழையற்ற வாக்கியம்", options: ["[A] உங்களோடு வருமவார் நாங்கள் அல்லாம்", "[B] உங்களோடு வருமவார் நாங்கள் அல்ல", "[C] உங்களோடு வருமவார் நாங்கள் அல்லன்", "[D] உங்களோடு வருமவார் நாங்கள் அல்லர்"], correct: "B" },

    // Render all questions dynamically
    let userAnswers = new Array(questionsData.length).fill(null);

    function renderQuiz() {
        const container = document.getElementById('quizRoot');
        container.innerHTML = '';
        questionsData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.setAttribute('data-qid', idx);
            const qNumber = idx + 1;
            card.innerHTML = `
                <div class="q-num">கேள்வி ${qNumber}</div>
                <div class="question-text">${q.text}</div>
                <div class="options" id="options-${idx}">
                    ${q.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx); // A,B,C,D
                        const isChecked = (userAnswers[idx] === letter);
                        return `
                            <div class="option" data-opt-letter="${letter}">
                                <input type="radio" name="q${idx}" value="${letter}" id="q${idx}_${letter}" ${isChecked ? 'checked' : ''}>
                                <label class="option-label" for="q${idx}_${letter}">${opt}</label>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="feedback" id="fb-${idx}" style="margin-top:8px;"></div>
            `;
            container.appendChild(card);
            // attach event listeners to radio buttons
            const radios = card.querySelectorAll(`input[type="radio"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    userAnswers[idx] = e.target.value;
                    // remove any previous wrong highlight & feedback
                    const fbDiv = document.getElementById(`fb-${idx}`);
                    if (fbDiv) fbDiv.innerHTML = '';
                    card.classList.remove('wrong-highlight');
                });
            });
        });
    }

    function evaluateAndShow() {
        let score = 0;
        for (let i = 0; i < questionsData.length; i++) {
            const userChoice = userAnswers[i];
            const correctLetter = questionsData[i].correct;
            const card = document.querySelector(`.question-card[data-qid='${i}']`);
            const fbDiv = document.getElementById(`fb-${i}`);
            if (!card) continue;
            if (userChoice === correctLetter) {
                score++;
                if (fbDiv) fbDiv.innerHTML = `<span class="correct-answer-note">✓ சரியான பதில்</span>`;
                card.classList.remove('wrong-highlight');
            } else {
                if (fbDiv) {
                    const correctOptionText = questionsData[i].options.find((opt, idx) => String.fromCharCode(65+idx) === correctLetter);
                    fbDiv.innerHTML = `<span class="correct-answer-note" style="background:#ffe0b5; color:#b45f06;">✗ தவறு. சரியான விடை: ${correctLetter}) ${correctOptionText}</span>`;
                }
                card.classList.add('wrong-highlight');
            }
        }
        const total = questionsData.length;
        const percent = Math.round((score/total)*100);
        document.getElementById('scoreDisplay').innerHTML = `🏆 உங்கள் மதிப்பெண் : ${score} / ${total} (${percent}%) ${percent >= 70 ? '🎉 நல்ல பயிற்சி!' : '💪 மீண்டும் முயலுக'}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function resetQuiz() {
        userAnswers = new Array(questionsData.length).fill(null);
        renderQuiz();
        document.getElementById('scoreDisplay').innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // initial render
    renderQuiz();
    document.getElementById('submitBtn').addEventListener('click', evaluateAndShow);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
</script>
</body>
</html>
